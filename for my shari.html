<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Shari 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  overflow: hidden;
}

.container {
  padding: 20px;
  margin-top: 30px;
  animation: fadeIn 1s ease;
}

h1 { font-size: 28px; }
p { font-size: 18px; }

button {
  padding: 12px 20px;
  font-size: 16px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.yes { background: #4CAF50; color: white; }
.no {
  background: #ff4d4d;
  color: white;
  position: absolute;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.gallery img {
  width: 150px;
  height: 150px;
  border-radius: 15px;
  object-fit: cover;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

img.single {
  width: 260px;
  height: 260px;
  border-radius: 20px;
  margin-top: 20px;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container" id="app">
  <h1>Hey Shari 💖</h1>
  <p>I made something special just for you 😌</p>
  <button class="yes" onclick="nextStep()">Start 💫</button>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<script>
let step = 0;

function nextStep() {
  step++;
  const app = document.getElementById("app");

  if(step === 1){
    app.innerHTML = `
      <h1>First Question 😄</h1>
      <p>Do you know how important you are to me?</p>
      <button class="yes" onclick="nextStep()">Yes 😊</button>
      <button class="no" id="noBtn">No 😏</button>
    `;
    moveButton();
  }

  else if(step === 2){
    app.innerHTML = `
      <h1>Second Question 📸</h1>
      <p>Do you remember this moment?</p>
      <img class="single" src="https://i.ibb.co/99674TMh/image.jpg">
      <br>
      <button class="yes" onclick="nextStep()">Of course 💖</button>
      <button class="no" id="noBtn">Maybe 🤭</button>
    `;
    moveButton();
  }

  else if(step === 3){
    app.innerHTML = `
      <h1>Third Question 🥺</h1>
      <p>Can I always be your best brother?</p>
      <img class="single" src="https://i.ibb.co/wN7XXny7/image.jpg">
      <br>
      <button class="yes" onclick="nextStep()">Always 💖</button>
      <button class="no" id="noBtn">Let me think 😜</button>
    `;
    moveButton();
  }

  else if(step === 4){
    app.innerHTML = `
      <h1>Final Question 💖</h1>
      <p>Am I the best brother ever?</p>
      <img class="single" src="https://i.ibb.co/dwdFGTnV/image.jpg">
      <br>
      <button class="yes" onclick="finalScreen()">YESSS 💖</button>
      <button class="no" id="noBtn">No 😆</button>
    `;
    moveButton();
  }
}

// Moving + changing button text
function moveButton(){
  const btn = document.getElementById("noBtn");

  const texts = [
    "Are you sure? 😢",
    "Think again 😏",
    "No option 😂",
    "Click YES 😜",
    "Don't do this 😭",
    "Shariiii 😆",
    "Wrong choice 👀"
  ];

  btn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";

    btn.innerText = texts[Math.floor(Math.random() * texts.length)];
  });
}

// Final screen with ALL photos
function finalScreen(){
  document.getElementById("music").play();

  document.body.innerHTML = `
    <div class="container">
      <h1>🎉 For You, Shari 💖</h1>
      <p>
      I will always be there for you as your best brother 💙<br><br>
      No matter what happens,<br>
      I will stand by your side 😌<br><br>
      You are not just my best friend…<br>
      You are my family ❤️
      </p>

      <div class="gallery">
        <img src="https://i.ibb.co/99674TMh/image.jpg">
        <img src="https://i.ibb.co/wN7XXny7/image.jpg">
        <img src="https://i.ibb.co/dwdFGTnV/image.jpg">
        <img src="https://i.ibb.co/Cs6WkJFb/image.jpg">
        <img src="https://i.ibb.co/FRvb9TR/image.jpg">
      </div>
    </div>
  `;

  confetti();
}

// Confetti
function confetti(){
  for(let i=0;i<150;i++){
    let div=document.createElement("div");
    div.style.position="absolute";
    div.style.width="8px";
    div.style.height="8px";
    div.style.background="white";
    div.style.top=Math.random()*window.innerHeight+"px";
    div.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(div);
  }
}
</script>

</body>
</html>
